#   namespace: ai-agents
# spec:
#   secretTargetRef:
#   - parameter: password
#     name: redis-secret
#     key: redis-password

---
# ─────────────────────────────────────────────────────────────────────────────
# PodDisruptionBudget — keep at least 1 worker alive during rolling updates
# "PDB = availability contract. Non-negotiable."
# ─────────────────────────────────────────────────────────────────────────────
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: ai-worker-pdb
  namespace: ai-agents
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app: ai-worker
