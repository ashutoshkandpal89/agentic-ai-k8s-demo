# ─────────────────────────────────────────────────────────────────────────────
# OpenTelemetry Collector — receives traces from agents, exports to Jaeger/Tempo
# ─────────────────────────────────────────────────────────────────────────────
apiVersion: v1
kind: ConfigMap
metadata:
  name: otel-collector-config
  namespace: monitoring
data:
  otel-collector-config.yaml: |
    receivers:
      otlp:
        protocols:
          grpc:
            endpoint: 0.0.0.0:4317
          http:
            endpoint: 0.0.0.0:4318

      # Also scrape Prometheus metrics (unified pipeline)
      prometheus:
        config:
          scrape_configs:
            - job_name: 'otel-collector'
              static_configs:
                - targets: ['localhost:8888']

    processors:
      # Batch spans for efficiency
      batch:
        timeout: 5s
        send_batch_size: 512

      # Resource detection — add k8s pod metadata to all spans
      resource:
        attributes:
          - key: service.namespace
            value: "ai-agents"
            action: upsert
          - key: deployment.environment
            value: "demo"
            action: upsert

      # Memory limiter — OTel Collector should not OOM under high trace load
      memory_limiter:
        check_interval: 1s
        limit_mib: 256
        spike_limit_mib: 64

      # Filter: drop health check spans (noise reduction)
      filter:
        traces:
          span:
            - 'attributes["http.route"] == "/healthz"'
            - 'attributes["http.route"] == "/readyz"'
            - 'attributes["http.route"] == "/metrics"'

    exporters:
      # Debug exporter (demo: prints traces to stdout)
      debug:
        verbosity: basic
        sampling_initial: 5
        sampling_thereafter: 200

      # Jaeger for trace UI (optional, add if Jaeger is deployed)
      # jaeger:
      #   endpoint: jaeger:14250
      #   tls:
      #     insecure: true

      # Prometheus exporter — expose trace-derived metrics
      prometheus:
        endpoint: "0.0.0.0:8889"
        namespace: "otel"
        resource_to_telemetry_conversion:
          enabled: true

      # OTLP to Grafana Tempo (optional)
      # otlp/tempo:
      #   endpoint: tempo:4317
      #   tls:
      #     insecure: true

    extensions:
      health_check:
        endpoint: 0.0.0.0:13133
      pprof:
        endpoint: 0.0.0.0:1777

    service:
      extensions: [health_check, pprof]
      pipelines:
        traces:
          receivers:  [otlp]
          processors: [memory_limiter, resource, filter, batch]
          exporters:  [debug]

        metrics:
          receivers:  [otlp, prometheus]
          processors: [memory_limiter, batch]
          exporters:  [prometheus]

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: otel-collector
  namespace: monitoring
spec:
  replicas: 1
  selector:
    matchLabels:
      app: otel-collector
  template:
    metadata:
      labels:
        app: otel-collector
    spec:
      containers:
      - name: otel-collector
        image: otel/opentelemetry-collector-contrib:0.99.0
        args: ["--config=/conf/otel-collector-config.yaml"]
        ports:
        - containerPort: 4317   # OTLP gRPC
          name: otlp-grpc
        - containerPort: 4318   # OTLP HTTP
          name: otlp-http
        - containerPort: 8889   # Prometheus metrics
          name: metrics
        - containerPort: 13133  # Health check
          name: healthcheck
        volumeMounts:
        - name: config
          mountPath: /conf
        resources:
          requests:
            cpu:    "50m"
            memory: "128Mi"
          limits:
            cpu:    "500m"
            memory: "256Mi"
        livenessProbe:
          httpGet:
            path: /
            port: 13133
          initialDelaySeconds: 10
          periodSeconds: 15
      volumes:
      - name: config
        configMap:
          name: otel-collector-config

---
apiVersion: v1
kind: Service
metadata:
  name: otel-collector
  namespace: monitoring
spec:
  selector:
    app: otel-collector
  ports:
  - name: otlp-grpc
    port: 4317
    targetPort: 4317
  - name: otlp-http
    port: 4318
    targetPort: 4318
  - name: metrics
    port: 8889
    targetPort: 8889
