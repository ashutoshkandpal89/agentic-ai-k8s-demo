apiVersion: v1
kind: Namespace
metadata:
  name: ai-agents
  labels:
    type: ai-agent
    team: platform
    cost-center: ai-infra
  annotations:
    "operator.io/token-budget": "50000"
    "operator.io/owner": "platform-team"
---
apiVersion: v1
kind: ResourceQuota
metadata:
  name: ai-agents-quota
  namespace: ai-agents
spec:
  hard:
    requests.cpu:    "8"
    requests.memory: "16Gi"
    limits.cpu:      "16"
    limits.memory:   "32Gi"
    pods: "25"
    count/services:    "10"
    count/configmaps:  "20"
    requests.storage: "50Gi"
---
apiVersion: v1
kind: LimitRange
metadata:
  name: ai-container-limits
  namespace: ai-agents
spec:
  limits:
  - type: Container
    default:
      cpu:    "500m"
      memory: "512Mi"
    defaultRequest:
      cpu:    "100m"
      memory: "256Mi"
    max:
      cpu:    "4"
      memory: "8Gi"
    min:
      cpu:    "50m"
      memory: "64Mi"
