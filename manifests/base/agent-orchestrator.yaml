apiVersion: apps/v1
kind: Deployment
metadata:
  name: agent-orchestrator
  namespace: ai-agents
  labels:
    app: agent-orchestrator
    component: orchestration
    version: "1.0.0"
spec:
  replicas: 1
  selector:
    matchLabels:
      app: agent-orchestrator
  template:
    metadata:
      labels:
        app: agent-orchestrator
        component: orchestration
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/path:   "/metrics"
        prometheus.io/port:   "8080"
    spec:
      serviceAccountName: agent-orchestrator-sa
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000
      containers:
      - name: orchestrator
        image: agent-orchestrator:latest
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 8080
          name: http
        env:
        - name: REDIS_URL
          value: "redis://redis:6379"
        - name: TASK_QUEUE
          value: "task-queue"
        - name: MOCK_LLM
          value: "true"
        - name: MAX_TOKEN_BUDGET
          value: "50000"
        - name: OTLP_ENDPOINT
          value: "http://otel-collector.monitoring.svc.cluster.local:4317"
        resources:
          requests:
            cpu:    "100m"
            memory: "256Mi"
          limits:
            cpu:    "1"
            memory: "512Mi"
        livenessProbe:
          httpGet:
            path: /healthz
            port: 8080
          initialDelaySeconds: 15
          periodSeconds: 15
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /readyz
            port: 8080
          initialDelaySeconds: 5
          periodSeconds: 10
        securityContext:
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: true
          capabilities:
            drop: ["ALL"]
        volumeMounts:
        - name: tmp
          mountPath: /tmp
      volumes:
      - name: tmp
        emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: agent-orchestrator
  namespace: ai-agents
spec:
  selector:
    app: agent-orchestrator
  ports:
  - name: http
    port: 8080
    targetPort: 8080
  type: ClusterIP
---
apiVersion: v1
kind: Service
metadata:
  name: agent-orchestrator-nodeport
  namespace: ai-agents
spec:
  selector:
    app: agent-orchestrator
  ports:
  - name: http
    port: 8080
    targetPort: 8080
    nodePort: 30080
  type: NodePort
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: agent-orchestrator-sa
  namespace: ai-agents
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: agent-orchestrator-role
  namespace: ai-agents
rules:
- apiGroups: [""]
  resources: ["configmaps"]
  verbs: ["get", "list"]
- apiGroups: [""]
  resources: ["pods"]
  verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: agent-orchestrator-rolebinding
  namespace: ai-agents
subjects:
- kind: ServiceAccount
  name: agent-orchestrator-sa
  namespace: ai-agents
roleRef:
  kind: Role
  name: agent-orchestrator-role
  apiGroup: rbac.authorization.k8s.io
