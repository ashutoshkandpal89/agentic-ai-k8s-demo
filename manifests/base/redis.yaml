apiVersion: apps/v1
kind: Deployment
metadata:
  name: redis
  namespace: ai-agents
  labels:
    app: redis
    component: task-queue
spec:
  replicas: 1
  selector:
    matchLabels:
      app: redis
  template:
    metadata:
      labels:
        app: redis
        component: task-queue
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port:   "9121"
    spec:
      containers:
      - name: redis
        image: redis:7.2-alpine
        ports:
        - containerPort: 6379
          name: redis
        command: ["redis-server", "--maxmemory", "256mb", "--maxmemory-policy", "allkeys-lru"]
        resources:
          requests:
            cpu:    "50m"
            memory: "128Mi"
          limits:
            cpu:    "500m"
            memory: "512Mi"
        livenessProbe:
          exec:
            command: ["redis-cli", "ping"]
          initialDelaySeconds: 10
          periodSeconds: 10
        readinessProbe:
          exec:
            command: ["redis-cli", "ping"]
          initialDelaySeconds: 5
          periodSeconds: 5
      - name: redis-exporter
        image: oliver006/redis_exporter:v1.60.0
        ports:
        - containerPort: 9121
          name: metrics
        resources:
          requests:
            cpu:    "10m"
            memory: "32Mi"
          limits:
            cpu:    "100m"
            memory: "64Mi"
---
apiVersion: v1
kind: Service
metadata:
  name: redis
  namespace: ai-agents
  labels:
    app: redis
spec:
  selector:
    app: redis
  ports:
  - name: redis
    port: 6379
    targetPort: 6379
  - name: metrics
    port: 9121
    targetPort: 9121
